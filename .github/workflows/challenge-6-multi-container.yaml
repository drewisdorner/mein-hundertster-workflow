name: Challenge 6 – Multi-Container-Stack

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  multi-container:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Owner in Kleinbuchstaben umwandeln
        id: owner
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: App-Image bauen, in den Daemon laden und gha-Cache nutzen
        uses: docker/build-push-action@v6
        with:
          context: ./challenge6
          load: true
          tags: challenge6-app:${{ github.sha }}
          cache-from: type=gha,scope=challenge6
          cache-to: type=gha,mode=max,scope=challenge6

      - name: Stack starten
        env:
          APP_TAG: ${{ github.sha }}
        run: docker compose up -d

      - name: Auf App und Redis-Verbindung warten
        run: |
          for i in {1..30}; do
            antwort=$(curl -sf http://localhost:5050/health || true)
            echo "Versuch $i: $antwort"
            if echo "$antwort" | grep -q '"redis":"up"'; then
              echo "App ist bereit und mit Redis verbunden."
              exit 0
            fi
            sleep 1
          done
          echo "App war nicht rechtzeitig bereit."
          exit 1

      - name: Beweis dass die Container miteinander reden
        run: |
          a=$(curl -sf http://localhost:5050/counter | python3 -c 'import sys,json; print(json.load(sys.stdin)["hits"])')
          b=$(curl -sf http://localhost:5050/counter | python3 -c 'import sys,json; print(json.load(sys.stdin)["hits"])')
          c=$(curl -sf http://localhost:5050/counter | python3 -c 'import sys,json; print(json.load(sys.stdin)["hits"])')
          echo "Counter-Werte aus drei Aufrufen: $a, $b, $c"
          if [ "$b" -le "$a" ] || [ "$c" -le "$b" ]; then
            echo "Counter steigt nicht – die App spricht nicht mit Redis."
            exit 1
          fi
          echo "Redis und App haben sauber miteinander geredet."

      - name: Container-Logs bei Fehler
        if: failure()
        run: docker compose logs

      - name: Stack wieder stoppen
        if: always()
        run: docker compose down -v

      - name: An GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: App-Image nach GHCR pushen
        uses: docker/build-push-action@v6
        with:
          context: ./challenge6
          push: true
          tags: ghcr.io/${{ steps.owner.outputs.lowercase }}/mein-hundertster-workflow-challenge6:${{ github.sha }}
          cache-from: type=gha,scope=challenge6
          cache-to: type=gha,mode=max,scope=challenge6
