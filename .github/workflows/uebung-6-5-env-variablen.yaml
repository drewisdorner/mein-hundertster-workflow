name: Übung 6.5 – Umgebungsvariablen auf drei Ebenen

on:
  push:
  workflow_dispatch:

env:
  APP_NAME: demo-app

jobs:
  variablen-zeigen:
    runs-on: ubuntu-latest
    env:
      APP_VERSION: 1.0.0
    steps:
      - name: Werte aus Workflow- und Job-Ebene (Shell-Syntax)
        run: |
          echo "APP_NAME (Workflow-Ebene): $APP_NAME"
          echo "APP_VERSION (Job-Ebene):   $APP_VERSION"

      - name: Werte über Expression-Syntax
        run: |
          echo "APP_NAME via Expression:    ${{ env.APP_NAME }}"
          echo "APP_VERSION via Expression: ${{ env.APP_VERSION }}"

      - name: Step-Ebene überschreibt APP_VERSION
        env:
          APP_VERSION: 2.0.0-beta
        run: |
          echo "Innerhalb dieses Steps:"
          echo "  APP_NAME    = $APP_NAME"
          echo "  APP_VERSION = $APP_VERSION (überschrieben)"

      - name: Nach der Überschreibung ist Job-Wert wieder aktiv
        run: |
          echo "Außerhalb des überschreibenden Steps:"
          echo "  APP_VERSION = $APP_VERSION (Job-Ebene wirkt wieder)"
