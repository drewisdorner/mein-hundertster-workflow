name: Übung 6.9 – GHCR Push

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  push-ghcr:
    runs-on: ubuntu-latest
    steps:
      - name: Code auschecken
        uses: actions/checkout@v4

      - name: Buildx einrichten
        uses: docker/setup-buildx-action@v3

      - name: Owner in Kleinbuchstaben umwandeln
        id: owner
        run: echo "lowercase=$(echo '${{ github.repository_owner }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: An GHCR anmelden
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Image bauen und mit SHA + latest pushen
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ steps.owner.outputs.lowercase }}/mein-hundertster-workflow:${{ github.sha }}
            ghcr.io/${{ steps.owner.outputs.lowercase }}/mein-hundertster-workflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
